# =============================================================================
# Docker Compose Configuration for AI Teaching Assistant
# =============================================================================
# Production-ready PostgreSQL setup with proper security and persistence
#
# Usage:
#   Development:  docker-compose up -d
#   Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Stop:         docker-compose down
#   With volumes: docker-compose down -v (removes data!)
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: grader_postgres
    restart: unless-stopped
    
    # Environment configuration (use .env file in production)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grader_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grader_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-grader_db}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      # Timezone
      TZ: UTC
    
    # Port mapping (exposed for DBeaver and local development)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    
    # Persistent volume for data
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    
    # Health check for container orchestration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grader_user} -d ${POSTGRES_DB:-grader_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Resource limits (adjust for your environment)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - grader_network

  # ===========================================================================
  # Redis (Optional - for caching and session storage)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: grader_redis
    restart: unless-stopped
    
    # Redis configuration
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    
    ports:
      - "${REDIS_PORT:-6379}:6379"
    
    volumes:
      - redis_data:/data
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    
    networks:
      - grader_network

  # ===========================================================================
  # Celery Workers - Process background jobs
  # ===========================================================================
  
  # Document Worker: RAG indexing + LLM quiz generation (shared process, thread pool)
  # CRITICAL: --pool=threads ensures all tasks share the same process memory.
  # Without it, Celery defaults to prefork on Linux, forking separate child
  # processes with isolated singletons — defeating the purpose of this merge.
  worker-doc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grader_worker_doc
    restart: unless-stopped
    command: celery -A backend.celery_app worker --pool=threads -Q rag,llm,celery,default -c 3 --loglevel=INFO -n doc@%h
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-grader_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-grader_secret_password}
      - POSTGRES_DB=${POSTGRES_DB:-grader_db}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_RATE_LIMIT=${LLM_RATE_LIMIT:-10}
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - grader_network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "celery -A backend.celery_app inspect ping -d doc@$$HOSTNAME --timeout 10 2>/dev/null | grep -q 'pong' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # Canvas Worker: Canvas API operations
  worker-canvas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grader_worker_canvas
    restart: unless-stopped
    command: celery -A backend.celery_app worker -Q canvas -c 4 --loglevel=INFO -n canvas@%h
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-grader_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-grader_secret_password}
      - POSTGRES_DB=${POSTGRES_DB:-grader_db}
      - CANVAS_RATE_LIMIT=${CANVAS_RATE_LIMIT:-50}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - grader_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # Flower - Celery monitoring dashboard (optional)
  # ===========================================================================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grader_flower
    restart: unless-stopped
    command: celery -A backend.celery_app flower --port=5555 --broker=redis://redis:6379/0
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - grader_network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

# =============================================================================
# Named Volumes (Persistent Storage)
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: grader_postgres_data
  redis_data:
    driver: local
    name: grader_redis_data

# =============================================================================
# Networks
# =============================================================================
networks:
  grader_network:
    driver: bridge
    name: grader_network
