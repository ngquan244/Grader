# =============================================================================
# Nginx Configuration Template — HTTP-only (staging / initial setup)
# =============================================================================
# Use this before SSL certificates are obtained.
# Once certbot succeeds, switch to the main nginx.conf template.
#
# Variables injected at runtime via envsubst:
#   - ${PRODUCTION_DOMAIN}
# =============================================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name ${PRODUCTION_DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # ── Request size limits ──────────────────────────────────────────────
    client_max_body_size 50M;

    # ── API proxy ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Static exports ───────────────────────────────────────────────────
    location /static/exports/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Frontend static files ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
