# =============================================================================
# Nginx Configuration Template for Production
# =============================================================================
# Variables injected at runtime via envsubst:
#   - ${PRODUCTION_DOMAIN}
# =============================================================================

# Rate limiting zone – shared across workers
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream backend {
    server backend:8000;
}

# ─── HTTP → HTTPS redirect (+ ACME challenge for certbot) ───────────────────
server {
    listen 80;
    server_name ${PRODUCTION_DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${PRODUCTION_DOMAIN};

    # ── SSL certificates (managed by certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${PRODUCTION_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PRODUCTION_DOMAIN}/privkey.pem;

    # ── SSL hardening ────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"              always;
    add_header X-Frame-Options         "SAMEORIGIN"           always;
    add_header X-XSS-Protection        "1; mode=block"        always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Request size limits ──────────────────────────────────────────────
    client_max_body_size 50M;

    # ── API proxy ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for streaming endpoints)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts for long-running LLM requests
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (pass-through) ──────────────────────────────────────
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Static exports (grades, results) ─────────────────────────────────
    location /static/exports/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Frontend static files ────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
